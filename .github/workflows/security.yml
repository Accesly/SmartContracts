name: Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly Monday 09:00 UTC — catches new CVEs in pinned deps.
    - cron: '0 9 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: cargo audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        # The OZ stellar-* deps are referenced by path; cargo audit only inspects
        # crates.io deps. This catches CVEs in transitive deps like ed25519-dalek.
        run: cargo audit --deny warnings

  cargo-deny:
    name: cargo deny (license check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
          # We only enforce license policy here; bans/advisories/sources are
          # covered by cargo-audit and dependabot.
          arguments: --workspace

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
